sample_episode: |
  # 5 steps, random actions, seed=0 test phase
  # format: step | action[vx,vy] | reward | done | info
  reset  | —                   | —       | —     | robot=(4.47,-3.45) goal=(-5.51,-1.23)
  step 1 | [ 0.9517,  0.9575]  | 0.0000  | False | Nothing
  step 2 | [ 0.8682,  0.9402]  | 0.1032  | False | Nothing (potential reward: moved toward goal)
  step 3 | [ 0.7379,  0.6920]  | 0.1630  | False | Nothing
  step 4 | [-1.1118, -0.7250]  | 0.1959  | False | Nothing
  step 5 | [ 0.3422, -0.0382]  | 0.2087  | False | Nothing
  # Observation fields stable across all 5 steps:
  #   - same 5 humans visible (static group_0 + 1 individual)
  #   - group_centroids and group_radii essentially unchanged (static group)
  #   - velocity_edges for visible humans track -robot.velocity each step
  #   - direction_consistency all-15 (feature disabled)

unknowns_or_blockers: |
  1. direction_consistency: field exists in ob but computation is commented out
     (crowd_sim_var_num.py:364-396). Always returns 15.0. Do not use.

  2. Action bounds: formal Box is (-inf, inf). The effective clipping to v_pref=1.0 m/s
     happens inside clip_action() for neural policies only. ORCA/SF override the action
     entirely. External policies should clip ‖action‖ to 1.0 before passing.

  3. robot_node theta: initialized to pi/2 in test mode (probe_env.py line 21) and
     does not update during holonomic steps (theta tracks orientation, not velocity
     direction). In training it updates only for unicycle kinematics. For holonomic
     policies theta can be treated as a static context feature.

  4. The formal observation_space does not include velocity_edges, clusters,
     group_members, grp, group_centroids, or group_radii. These are returned
     at runtime but an env.observation_space.contains() check will fail for the
     full ob dict. gym.spaces.Dict wrapping must be extended if needed.

  5. human_num_range = 0 (config), so human count is always exactly 20.
     max_human_num = human_num + human_num_range = 20. Tensor sizes are fixed.
